spring.application.name=backend
server.port=${PORT:8080}

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================

# Active profile / primary database: MySQL with dynamic environment variables, falling back to In-Memory H2 for local dev
spring.datasource.url=${DB_URL:jdbc:h2:mem:plant_store_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate DDL configuration (automatically creates/updates tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurable CORS Allowed Origins for Vercel & local development
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# ===================================================================
# MULTIPART CONFIGURATION (For AI Image Detection Uploads)
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CUSTOM APPLICATION SECURITY (JWT Settings)
# ===================================================================
# Using a secure 512-bit HS512 hex-encoded signature secret key
app.jwt.secret=9a65a9f3cf2b55b6ef6d7f02d41a87e5ff412c0192e213b28b7cf72df8cb234d3ea4bfbc22dcd4bf5df0193bb93cd3a5647df5d4b53fa41f237efb99e71bfa3e
app.jwt.expiration-ms=86400000

# ===================================================================
# AI PLANT DETECTION CONFIGURATION
# ===================================================================
# Provide keys below to activate live integrations; otherwise, high-fidelity simulator will run.
app.ai.plantid.key=
app.ai.openai.key=
