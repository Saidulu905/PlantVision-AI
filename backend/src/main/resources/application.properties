spring.application.name=backend
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================

# Active profile / primary database: In-Memory H2
spring.datasource.url=jdbc:h2:mem:plant_store_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate DDL configuration (automatically creates/updates tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL fallback comments
# spring.datasource.url=jdbc:mysql://localhost:3306/plant_store_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# MULTIPART CONFIGURATION (For AI Image Detection Uploads)
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CUSTOM APPLICATION SECURITY (JWT Settings)
# ===================================================================
# Using a secure 512-bit HS512 hex-encoded signature secret key
app.jwt.secret=9a65a9f3cf2b55b6ef6d7f02d41a87e5ff412c0192e213b28b7cf72df8cb234d3ea4bfbc22dcd4bf5df0193bb93cd3a5647df5d4b53fa41f237efb99e71bfa3e
app.jwt.expiration-ms=86400000

# ===================================================================
# AI PLANT DETECTION CONFIGURATION
# ===================================================================
# Provide keys below to activate live integrations; otherwise, high-fidelity simulator will run.
app.ai.plantid.key=
app.ai.openai.key=
