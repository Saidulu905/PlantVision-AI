databases:
  - name: plantvision-db
    databaseName: plantvision
    user: plantvision_user
    plan: free

services:
  # Backend Java Spring Boot Web Service
  - type: web
    name: plantvision-backend
    plan: free
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      # Inject database connection variables dynamically from the database
      - key: DB_HOST
        fromDatabase:
          name: plantvision-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: plantvision-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: plantvision-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: plantvision-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: plantvision-db
          property: password
      # Build the final JDBC URL using the injected host, port, and database name
      - key: DB_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl=true&sslmode=require
      # CORS: Allow requests from the frontend static site
      - key: CORS_ALLOWED_ORIGINS
        value: https://plantvision-frontend.onrender.com

  # Frontend Vite React Static Site
  - type: static
    name: plantvision-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Rewrite all routes to index.html to support React Router client-side routing
      - source: /*
        destination: /index.html
        type: rewrite
    envVars:
      # Direct frontend requests to the backend public URL
      - key: VITE_API_BASE_URL
        value: https://plantvision-backend.onrender.com
