services:
  # MySQL Web Service (Free Tier Workaround)
  - type: web
    name: plantvision-mysql
    plan: free
    runtime: image
    image: mysql:8.0
    envVars:
      - key: PORT
        value: 3306
      - key: MYSQL_ROOT_PASSWORD
        generate: true
      - key: MYSQL_DATABASE
        value: plantvision
      - key: MYSQL_USER
        value: plantvision_user
      - key: MYSQL_PASSWORD
        generate: true

  # Backend Java Spring Boot Web Service
  - type: web
    name: plantvision-backend
    plan: free
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      # Inject database connection variables dynamically from the MySQL web service
      - key: DB_HOST
        fromService:
          type: web
          name: plantvision-mysql
          property: host
      - key: DB_PORT
        fromService:
          type: web
          name: plantvision-mysql
          property: port
      - key: DB_NAME
        value: plantvision
      - key: DB_USERNAME
        value: plantvision_user
      - key: DB_PASSWORD
        fromService:
          type: web
          name: plantvision-mysql
          envVarKey: MYSQL_PASSWORD
      # Build the final JDBC URL using the injected host, port, and database name
      - key: DB_URL
        value: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      # CORS: Allow requests from the frontend static site
      - key: CORS_ALLOWED_ORIGINS
        value: https://plantvision-frontend.onrender.com

  # Frontend Vite React Static Site
  - type: web
    name: plantvision-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Rewrite all routes to index.html to support React Router client-side routing
      - source: /*
        destination: /index.html
        type: rewrite
    envVars:
      # Direct frontend requests to the backend public URL
      - key: VITE_API_BASE_URL
        value: https://plantvision-backend.onrender.com
